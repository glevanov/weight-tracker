services:
  mongodb:
    image: mongo:8.0.19
    container_name: local-weight
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - weight-data:/data/db

volumes:
  weight-data:
